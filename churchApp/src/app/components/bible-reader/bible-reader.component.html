<ion-header mode="ios">
  <ion-toolbar>
    <ion-buttons slot="start">
      @if (asPage) {
        <ion-menu-toggle>
          <ion-img src="../assets/icon/favicon.png" style="width: 35px; margin-left: 10px;"></ion-img>
        </ion-menu-toggle>
      } @else {
        <ion-button (click)="core.modalCtrl.dismiss()">
          <ion-icon name="chevron-back-outline"></ion-icon>
        </ion-button>
      }
    </ion-buttons>

    <ion-title>Lectura</ion-title>

    <ion-buttons slot="end">
      <ion-button (click)="openVerseHistoryModal()">
        <ion-icon size="large" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z'/></svg>"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [ngClass]="{'plainBibleBackground': !core.settings.showBibleBackgroundColor}"
    [scrollEvents]="true" (ionScroll)="onScroll($event)">
  <p id="bookLabel">{{book}}</p>
  <p id="chapterNumberLabel">{{chapterNumber}}</p>

  <p id="text" [class]="core.settings.bibleFont === 'sans-serif' ? 'bibleSimpleText' : 'bibleAestheticText'" [innerHTML]="text"></p>

  <p id="bibleInfo">Texto bíblico Reina-Valera 1960</p>
  
  @if (core.audio.selectedMessage) {
    <div style="touch-action: none; margin-bottom: 100px;">
      <app-mini-audio-player [message]="core.audio.selectedMessage" [style.--audio-player-bottom]="asPage ? '115px' : '60px'"
        (closing)="closeAudioPlayer()"
        (finish)="markAsListenedMessage($event)"
        [ignoreGesture]="!asPage"
        [class.player-down]="(core.showTabBar$ | async) === false && asPage">
      </app-mini-audio-player>
    </div>
  }
</ion-content>

<ion-footer mode="ios" [translucent]="true" 
      [ngClass]="{'lightFooter': core.settings.theme === 'light'}"
      [class.footer-down]="(core.showTabBar$ | async) === false && asPage"
      [style.--bible-reader-footer-bottom]="asPage ? '' : '0px'">
    <ion-grid>
      <ion-row class="ion-align-items-center">
        <ion-col size="2" style="display: flex; justify-content: end;" (click)="getAdjacentChapter('prev')">
          <ion-icon name="chevron-back-outline" size="large"></ion-icon>
        </ion-col>

        <ion-col size="8">
          <div #chapterBadge class="badgeLayout">
            <ion-badge (click)="showSimpleVerseSelector($event)">{{chapter}}</ion-badge>
          </div>
        </ion-col>

        <ion-col size="2" class="ion-justify-content-start" (click)="getAdjacentChapter('next')">
          <ion-icon name="chevron-forward-outline" size="large"></ion-icon>
        </ion-col>
      </ion-row>
    </ion-grid>
</ion-footer>
